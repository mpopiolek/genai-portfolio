services:
  hub-mock:
    build: ../../packages/hub-mock
    ports:
      - "8080:8080"
    environment:
      HUB_MOCK_PORT: "8080"

  multimodal-intel-pipeline:
    build: .
    depends_on:
      - hub-mock
    environment:
      AIDEVS_API_URL: http://hub-mock:8080
      AIDEVS_API_KEY: ${AIDEVS_API_KEY:-demo-key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_URL: ${OPENROUTER_API_URL:-https://openrouter.ai/api/v1}
      DEMO_MODE: ${DEMO_MODE:-1}
      INTEL_TRIGGER: ${INTEL_TRIGGER:-alpha sector}
    env_file:
      - path: .env
        required: false
